[server]
headless = true
port = 8501
address = "127.0.0.1"
enableCORS = true
enableXsrfProtection = true
maxUploadSize = 50
# Evite le scan de transformers/torchvision dans site-packages (bruit console)
fileWatcherType = "none"

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[runner]
# Ne pas importer les modules a chaque interaction (plus stable en dev)
fastReruns = true

[theme]
base = "light"
primaryColor = "#1e3a5f"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#eef2f7"
textColor = "#1a1a2e"
